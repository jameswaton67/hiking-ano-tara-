<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tara Hiking?</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f7fa, #b2dfdb);
            --primary-color: #00897b;
            --primary-hover: #00695c;
            --yes-color: #4caf50;
            --yes-hover: #388e3c;
            --no-color: #ffab91;
            --text-color: #263238;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Fredoka', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            overflow: hidden; /* Prevents scrollbars when button flies around */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #455a64;
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .primary-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .primary-btn:hover {
            background-color: var(--primary-hover);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            position: relative;
        }

        .yes-btn {
            background-color: var(--yes-color);
            color: white;
        }

        .yes-btn:hover {
            background-color: var(--yes-hover);
        }

        .no-btn {
            background-color: var(--no-color);
            color: white;
            /* Smooth animation when the button moves */
            transition: top 0.2s ease, left 0.2s ease, transform 0.2s ease; 
        }

        /* Success Screen */
        .hidden-section {
            display: none;
            opacity: 0;
        }

        .bounce-in {
            animation: bounceIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .btn { padding: 12px 24px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="main-screen" class="container">
        <h1>Ready for an adventure? 🌲☁️</h1>
        <button id="start-btn" class="btn primary-btn">Tara hiking?</button>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Are you sure? 👀🥾</h2>
            <div class="btn-group">
                <button id="yes-btn" class="btn yes-btn">Yes</button>
                <button id="no-btn" class="btn no-btn">No</button>
            </div>
        </div>
    </div>

    <div id="success-screen" class="container hidden-section">
        <h1 class="bounce-in">Yehey! 🎉</h1>
        <p class="bounce-in" style="animation-delay: 0.2s;">
            Thanks for agreeing!<br> 
            Contact <strong>Brylle Eijansantos</strong> for more details hehe. ⛰️🎒
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // DOM Elements
        const mainScreen = document.getElementById('main-screen');
        const modal = document.getElementById('modal');
        const startBtn = document.getElementById('start-btn');
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const successScreen = document.getElementById('success-screen');

        // Open Modal
        startBtn.addEventListener('click', () => {
            modal.classList.add('active');
        });

        // Run away logic for the "No" button
        const moveNoButton = () => {
            // Change position to fixed so it can escape the modal bounding box
            noBtn.style.position = 'fixed';
            
            // Calculate random coordinates within the window
            // Subtracting the button's width/height so it doesn't fly off-screen
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        };

        // Trigger the run away on both mouse hover and touch (for mobile)
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents clicking it on mobile
            moveNoButton();
        });

        // Success Logic for "Yes" button
        yesBtn.addEventListener('click', () => {
            // Hide modal and main screen
            modal.classList.remove('active');
            mainScreen.style.display = 'none';
            
            // Show success screen
            successScreen.style.display = 'block';
            setTimeout(() => {
                successScreen.style.opacity = '1';
            }, 50);

            // Trigger Confetti!
            fireConfetti();
        });

        // Fun Confetti Animation Function
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }
    </script>
</body>
</html>
